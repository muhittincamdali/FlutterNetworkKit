name: flutter_network_kit
description: Enterprise-grade networking toolkit for Flutter applications.
version: 3.0.0
homepage: https://github.com/muhittincamdali/FlutterNetworkKit
repository: https://github.com/muhittincamdali/FlutterNetworkKit

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.3
  http: ^1.2.1
  connectivity_plus: ^6.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  crypto: ^3.0.3
  web_socket_channel: ^3.0.1
  http_parser: ^4.0.2
  mime: ^1.0.5
  collection: ^1.18.0
  meta: ^1.11.0
  logging: ^1.2.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Temporarily removing complex code-gen to break the dependency cycle
  # build_runner: ^2.4.9
  # freezed: ^2.5.2
  # json_serializable: ^6.8.0
  # mockito: ^5.4.4

flutter:
  uses-material-design: true
